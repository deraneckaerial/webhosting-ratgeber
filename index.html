---
layout: default
---
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webhosting Ratgeber</title>
  <meta name="description" content="Webhosting & WordPress Hosting im Vergleich">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem 1.5rem; color: #333; }
    h1 { font-size: 2rem; }
    .post-list { list-style: none; padding: 0; }
    .post-list li { border-bottom: 1px solid #eee; padding: 1rem 0; }
    .post-list a { text-decoration: none; font-size: 1.1rem; color: #0066cc; }
    .post-date { color: #888; font-size: 0.85rem; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <h1>Webhosting Ratgeber</h1>
  <p>Webhosting & WordPress Hosting im Vergleich</p>
  <ul class="post-list">
    {% for post in site.posts %}
    <li>
      <a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
      <div class="post-date">{{ post.date | date: "%d.%m.%Y" }}</div>
    </li>
    {% endfor %}
  </ul>
</body>
</html>
